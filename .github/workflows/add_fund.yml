name: Adicionar fundo(s) ao histórico

on:
  workflow_dispatch:
    inputs:
      fundos:
        description: |
          JSON com um ou mais fundos. Exemplo:
          [{"cnpj":"46351969000108","nome":"Opportunity Global Equity Real Institucional FIC FIF Ações IE RL","exibicao":"Opportunity Global","curto":"Opportunity","tipo":"Long Only","trib":"RV","expo":"Internacional","banco":"Itaú"}]
        required: true

jobs:
  add-fund:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Adicionar fundo(s)
        run: python scripts/add_fund.py '${{ github.event.inputs.fundos }}'

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history.json docs/data.json scripts/fetch_data.py docs/index.html
          git diff --staged --quiet || git commit -m "feat: adiciona fundo(s) via add_fund workflow"
          git push
